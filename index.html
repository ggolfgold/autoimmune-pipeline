<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自免疾病管线矩阵面板</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; padding: 20px; min-height: 100vh; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; letter-spacing: 0.5px; }
.header .subtitle { font-size: 13px; color: #888; }
.header .status { font-size: 12px; color: #666; background: #fff; padding: 4px 12px; border-radius: 12px; border: 1px solid #e0e0e0; }

/* Filter Buttons */
.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 16px; border-radius: 16px; border: 1px solid #d0d0d0; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; color: #555; }
.filter-btn:hover { background: #f0f0f0; }
.filter-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.filter-btn[data-filter="global_china"].active { background: #1B5E20; border-color: #1B5E20; }
.filter-btn[data-filter="global_only"].active { background: #81C784; border-color: #81C784; color: #1a1a2e; }
.filter-btn[data-filter="phase3"].active { background: #F9A825; border-color: #F9A825; color: #1a1a2e; }
.filter-btn[data-filter="early"].active { background: #42A5F5; border-color: #42A5F5; }
.filter-btn[data-filter="negative"].active { background: #E53935; border-color: #E53935; }
.filter-btn[data-filter="no_data"].active { background: #9E9E9E; border-color: #9E9E9E; }

/* View Tabs */
.tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #e0e0e0; }
.tab-btn { padding: 10px 28px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab-btn:hover { color: #333; }
.tab-btn.active { color: #1a1a2e; border-bottom-color: #1a1a2e; font-weight: 600; }

/* Loading & Error */
.loading { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
.loading .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e0e0e0; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { text-align: center; padding: 40px; color: #E53935; font-size: 14px; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.error-msg .icon { font-size: 32px; margin-bottom: 8px; }
.retry-btn { margin-top: 12px; padding: 6px 20px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

/* Matrix Container */
.matrix-wrapper { overflow-x: auto; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.matrix-table { border-collapse: collapse; font-size: 12px; width: 100%; table-layout: fixed; white-space: nowrap; }
.matrix-table th, .matrix-table td { border: 1px solid #e0e0e0; text-align: center; padding: 0; overflow: hidden; text-overflow: ellipsis; }

/* Column Group Header */
.col-group-header { background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 600; padding: 8px 10px; text-align: center; border-color: #2a2a4e; }

/* Column Disease Header */
.col-disease-header { background: #2a2a4e; color: #ddd; font-size: 11px; font-weight: 500; padding: 6px 6px; text-align: center; border-color: #3a3a5e; width: 80px; }

/* Row Group Header */
.row-group-header { background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 600; padding: 6px 12px; text-align: left; border-color: #2a2a4e; }

/* Row Label */
.row-label { background: #f8f9fc; font-size: 12px; font-weight: 500; padding: 6px 12px; text-align: left; border-color: #e0e0e0; color: #333; width: 120px; overflow: hidden; text-overflow: ellipsis; }

/* Row label sub-group */
.row-label-sub { padding-left: 20px; font-size: 11px; color: #666; }

/* Cell */
.matrix-cell { padding: 6px 4px; cursor: pointer; transition: opacity 0.15s; font-size: 11px; width: 80px; max-width: 80px; position: relative; }
.matrix-cell:hover { opacity: 0.8; }
.matrix-cell .cell-count { font-weight: 600; font-size: 13px; }
.matrix-cell .cell-sub { font-size: 10px; color: rgba(0,0,0,0.5); margin-top: 1px; }

/* Cell Colors */
.cell-approved-both { background: #1B5E20; color: #fff; }
.cell-approved-both .cell-sub { color: rgba(255,255,255,0.7); }
.cell-approved-global { background: #81C784; color: #1a1a2e; }
.cell-approved-global .cell-sub { color: rgba(0,0,0,0.5); }
.cell-phase3 { background: #F9A825; color: #1a1a2e; }
.cell-phase3 .cell-sub { color: rgba(0,0,0,0.5); }
.cell-early { background: #42A5F5; color: #fff; }
.cell-early .cell-sub { color: rgba(255,255,255,0.7); }
.cell-negative { background: #E53935; color: #fff; }
.cell-negative .cell-sub { color: rgba(255,255,255,0.7); }
.cell-no-data { background: #f5f5f5; color: #bbb; cursor: default; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 10px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-header { padding: 16px 20px 12px; border-bottom: 1px solid #eee; }
.modal-header h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; }
.modal-header .modal-sub { font-size: 12px; color: #888; margin-top: 4px; }
.modal-body { padding: 16px 20px 20px; }
.modal-close { float: right; cursor: pointer; font-size: 20px; color: #aaa; line-height: 1; }
.modal-close:hover { color: #333; }

.pipeline-section { margin-bottom: 14px; }
.pipeline-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #1a1a2e; padding-bottom: 4px; border-bottom: 1px solid #eee; }
.pipeline-section h3.active-title { color: #1B5E20; }
.pipeline-section h3.terminated-title { color: #E53935; }

.pipeline-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; margin-bottom: 4px; background: #f8f9fc; border-radius: 4px; font-size: 12px; }
.pipeline-item .drug-name { font-weight: 500; }
.pipeline-subitem { padding: 2px 0 2px 36px; font-size: 12px; color: #777; }
.pipeline-subitem span { margin-right: 6px; }
.pipeline-item .phase-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.phase-tag.approved { background: #1B5E20; color: #fff; }
.phase-tag.phase3 { background: #F9A825; color: #1a1a2e; }
.phase-tag.early { background: #42A5F5; color: #fff; }
.phase-tag.terminated { background: #E53935; color: #fff; }

.status-badge { font-size: 11px; display: inline-block; padding: 1px 8px; border-radius: 8px; margin-left: 6px; }
.status-global-china { background: #1B5E20; color: #fff; }
.status-global-only { background: #81C784; color: #1a1a2e; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }

/* Company mode toggle */
.mode-toggle { display: inline-flex; align-items: center; gap: 8px; margin-left: 16px; font-size: 12px; color: #888; }
.mode-toggle label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
.mode-toggle input[type="checkbox"] { cursor: pointer; }
</style>
</head>

<div class="header">

// ========== HELPER FUNCTIONS ==========
function getPhaseMaxPhase(phases) {
let best = null;
let bestRank = 999;
for (const p of phases) {
const rank = PHASE_RANK[p];
if (rank !== undefined && rank < bestRank) {
best = p;
bestRank = rank;
}
}
return best || phases[0] || '';
}
function getCellStatus(globalPhase, chinaPhase, isInactive) {
if (isInactive) return 'negative';
if (globalPhase === '批准上市' && chinaPhase === '批准上市') return 'approved_both';
if (globalPhase === '批准上市') return 'approved_global';
const rank = PHASE_RANK[globalPhase];
if (rank !== undefined && rank <= 2) return 'phase3'; // III期 or 申请上市
if (rank !== undefined && rank <= 7) return 'early'; // II期 down to I期
return 'no_data';
}
function getCellColorClass(status) {
switch (status) {
case 'approved_both': return 'cell-approved-both';
case 'approved_global': return 'cell-approved-global';
case 'phase3': return 'cell-phase3';
case 'early': return 'cell-early';
case 'negative': return 'cell-negative';
default: return 'cell-no-data';
}
}
function getStatusDisplay(status) {
switch (status) {
case 'approved_both': return '全球：批准上市 | 中国：批准上市';
case 'approved_global': return '全球：批准上市 | 中国：未获批';
case 'phase3': return '全球：III期临床';
case 'early': return '早期临床（I/II期）';
case 'negative': return '终止/暂停/失败';
default: return '无管线记录';
}
}
function formatPhaseTag(phase) {
if (phase === '批准上市') return { cls: 'approved', label: '获批' };
if (phase === 'III期临床' || phase === '申请上市') return { cls: 'phase3', label: phase };
return { cls: 'early', label: phase };
}
// Disease group helper
function getDiseaseGroup(diseaseKey) {
const col = DISEASE_COLUMNS.find(c => c.key === diseaseKey);
return col ? col.group : '其他';
}
// Target group helper
function getTargetGroup(targetName) {
for (const g of TARGET_GROUPS) {
if (g.targets.includes(targetName)) return g.name;
}
// Auto-classify by keywords
const t = targetName.toLowerCase();
if (t.includes('jak') || t.includes('pde4') || t.includes('tyk2')) return '① JAK/STAT 通路';
if (t.includes('il-17') || t.includes('il-23') || t.includes('il-12') || t.includes('ror')) return '② Th17/IL-23 通路';
if (t.includes('il-4') || t.includes('il-13') || t.includes('tslp') || t.includes('ige') || t.includes('ox40') || t.includes('mrg') || t.includes('c-kit') || t.includes('il-5') || t.includes('il-33')) return '③ Th2/2型炎症通路';
if (t.includes('btk') || t.includes('fcrn') || t.includes('baff') || t.includes('cd40') || t.includes('c5') || t.includes('c1s') || t.includes('cfb') || t.includes('tlr') || t.includes('ifnar') || t.includes('cd20') || t.includes('cd38') || t.includes('s1pr')) return '④ 多通路/自身抗体';
return '⑤ 其他促炎/抗炎';
}
// Company type
function getCompanyGroup(companyName) {
if (MNC_COMPANIES.includes(companyName)) return 'MNC Top Pharma';
if (CN_COMPANIES.includes(companyName)) return '中国创新药企';
return '其他';
}
// ========== FILTER ==========
function getFilteredRows(rows) {
if (currentFilter === 'all') return rows;
return rows.filter(r => {
const isInactive = r.status === 'Inactive';
const status = getCellStatus(r.phaseGlobal, r.phaseChina, isInactive);
switch (currentFilter) {
case 'global_china': return status === 'approved_both';
case 'global_only': return status === 'approved_global';
case 'phase3': return status === 'phase3';
case 'early': return status === 'early';
case 'negative': return status === 'negative';
case 'no_data': return status === 'no_data';
default: return true;
}
});
}
// ========== RENDER ==========
function render(view) {
const filtered = getFilteredRows(allRows);
if (view === 'target') {
renderTargetView(filtered);
} else {
renderCompanyView(filtered);
}

function renderTargetView(rows) {
// Build cell data: target × disease
const cellMap = {}; // "target||disease" => {pipelines: [], maxPhase, status, etc.}
for (const r of rows) {
const key = `${r.target}||${r.disease}`;
if (!cellMap[key]) cellMap[key] = { pipelines: [], target: r.target, disease: r.disease };
const isInactive = r.status === 'Inactive';
cellMap[key].pipelines.push({
drug: r.drug,
company: r.company,
phaseGlobal: r.phaseGlobal,
phaseChina: r.phaseChina,
isInactive: isInactive,
status: r.status,
});
}
// Compute cell summary
for (const key in cellMap) {
const cell = cellMap[key];
const activePipes = cell.pipelines.filter(p => !p.isInactive);
const terminatedPipes = cell.pipelines.filter(p => p.isInactive);
cell.activeCount = activePipes.length;
cell.terminatedCount = terminatedPipes.length;
cell.totalCount = cell.pipelines.length;
if (activePipes.length > 0) {
const globalPhases = activePipes.map(p => p.phaseGlobal);
const chinaPhases = activePipes.map(p => p.phaseChina);
cell.maxGlobalPhase = getPhaseMaxPhase(globalPhases);
cell.maxChinaPhase = getPhaseMaxPhase(chinaPhases);
cell.isNegative = false;
} else if (terminatedPipes.length > 0) {
cell.maxGlobalPhase = '';
cell.maxChinaPhase = '';
cell.isNegative = true;
} else {
cell.maxGlobalPhase = '';
cell.maxChinaPhase = '';
cell.isNegative = false;
}
cell.cellStatus = getCellStatus(cell.maxGlobalPhase, cell.maxChinaPhase, cell.isNegative);
cell.activePipelines = activePipes;
cell.terminatedPipelines = terminatedPipes;
}
// Filter: only keep targets that have at least one match in our 12 diseases
const targetsWithData = new Set();
for (const key of Object.keys(cellMap)) {
const t = key.split('||')[0];
if (DISEASE_COLUMNS.some(dc => dc.key === key.split('||')[1])) {
targetsWithData.add(t);
}
}
// Get unique targets in order (by group)
const targetSet = new Set();
rows.forEach(r => targetSet.add(r.target));
// Only show targets that have data in at least one disease column
const filteredTargetSet = new Set([...targetSet].filter(t => targetsWithData.has(t) && t.trim() !== ''));
const targetList = [];
for (const g of TARGET_GROUPS) {
const gTargets = g.targets.filter(t => filteredTargetSet.has(t));
// Also check auto-classified
const autoTargets = [...filteredTargetSet].filter(t => getTargetGroup(t) === g.name && !gTargets.includes(t));
const allGTargets = [...gTargets, ...autoTargets].sort();
if (allGTargets.length > 0) {
targetList.push({ group: g.name, targets: allGTargets });
}
}
// Check for ungrouped targets
const groupedTargets = new Set();
targetList.forEach(g => g.targets.forEach(t => groupedTargets.add(t)));
const ungrouped = [...filteredTargetSet].filter(t => !groupedTargets.has(t)).sort();
if (ungrouped.length > 0) {
targetList.push({ group: '其他', targets: ungrouped });
}
// Build HTML
let html = '<div class="matrix-wrapper"><table class="matrix-table">';
// Column group + disease headers
html += '<thead><tr>';
html += '<th class="row-group-header" style="width:120px;">靶点</th>';
let currentColGroup = '';
let colGroupSpan = 0;
// First pass: build col groups
const colGroups = [];
for (const dc of DISEASE_COLUMNS) {
if (colGroups.length === 0 || colGroups[colGroups.length-1].name !== dc.group) {
colGroups.push({ name: dc.group, cols: [dc] });
} else {
colGroups[colGroups.length-1].cols.push(dc);
}
}
// Column group header row
let colGroupRow = '<tr><th class="row-group-header">靶点</th>';
for (const cg of colGroups) {
colGroupRow += `<th class="col-group-header" colspan="${cg.cols.length}">${cg.name}</th>`;
}
colGroupRow += '</tr>';
// Disease header row  
let diseaseRow = '<tr><th class="row-group-header" style="background:#2a2a4e;"></th>';
for (const dc of DISEASE_COLUMNS) {
const lines = dc.display.split('\n');
diseaseRow += `<th class="col-disease-header">${lines[0]}<br>${lines.slice(1).join('<br>')}</th>`;
}
diseaseRow += '</tr>';
html += colGroupRow + diseaseRow;
html += '</thead><tbody>';
// Data rows
for (const tg of targetList) {
// Group header
html += `<tr><td class="row-group-header" colspan="${DISEASE_COLUMNS.length + 1}">${tg.group}</td></tr>`;
for (const target of tg.targets) {
html += '<tr>';
html += `<td class="row-label">${target}</td>`;
for (const dc of DISEASE_COLUMNS) {
const key = `${target}||${dc.key}`;
const cell = cellMap[key];
if (!cell) {
html += `<td class="matrix-cell cell-no-data">-</td>`;
} else {
const colorClass = getCellColorClass(cell.cellStatus);
const display = cell.cellStatus === 'no_data' ? '-' : `${cell.activeCount}/${cell.totalCount}`;
const subText = cell.cellStatus !== 'no_data' && cell.activeCount > 0 
? (cell.cellStatus === 'approved_both' ? '全球+中国' : 
cell.cellStatus === 'approved_global' ? '全球(中国缺)' :
cell.cellStatus === 'phase3' ? 'III期' :
cell.cellStatus === 'early' ? '早期' : '终止')
: '';
html += `<td class="matrix-cell ${colorClass}" data-target="${target}" data-disease="${dc.key}" onclick="openModal('${target}','${dc.key}')">`;
html += `<div class="cell-count">${display}</div>`;
if (subText) html += `<div class="cell-sub">${subText}</div>`;
html += '</td>';
}
}
html += '</tr>';
}
}
html += '</tbody></table></div>';
container.innerHTML = html;
}
function renderCompanyView(rows) {
// Build cell data: company × disease
const cellMap = {};
for (const r of rows) {
const company = r.company;
const key = `${company}||${r.disease}`;
if (!cellMap[key]) cellMap[key] = { pipelines: [], company: company, disease: r.disease };
const isInactive = r.status === 'Inactive';
cellMap[key].pipelines.push({
drug: r.drug,
target: r.target,
phaseGlobal: r.phaseGlobal,
phaseChina: r.phaseChina,
isInactive: isInactive,
status: r.status,
mncTag: r.mncTag,
});
}
// Compute cell summary
for (const key in cellMap) {
const cell = cellMap[key];
const activePipes = cell.pipelines.filter(p => !p.isInactive);
const terminatedPipes = cell.pipelines.filter(p => p.isInactive);
cell.activeCount = activePipes.length;
cell.terminatedCount = terminatedPipes.length;
cell.totalCount = cell.pipelines.length;
if (activePipes.length > 0) {
const globalPhases = activePipes.map(p => p.phaseGlobal);
const chinaPhases = activePipes.map(p => p.phaseChina);
cell.maxGlobalPhase = getPhaseMaxPhase(globalPhases);
cell.maxChinaPhase = getPhaseMaxPhase(chinaPhases);
cell.isNegative = false;
} else if (terminatedPipes.length > 0) {
cell.maxGlobalPhase = '';
cell.maxChinaPhase = '';
cell.isNegative = true;
} else {
cell.maxGlobalPhase = '';
cell.maxChinaPhase = '';
cell.isNegative = false;
}
cell.cellStatus = getCellStatus(cell.maxGlobalPhase, cell.maxChinaPhase, cell.isNegative);
cell.activePipelines = activePipes;
cell.terminatedPipelines = terminatedPipes;
}
// Get company list
const companiesInData = new Set();
rows.forEach(r => companiesInData.add(r.company));
const companyList = [];
for (const g of COMPANY_GROUPS) {
if (showAllCompanies) {
// Show all companies in the list, even with no data
const gCompanies = g.companies.map(c => {
const hasData = companiesInData.has(c);
return { name: c, hasData };
});
companyList.push({ group: g.name, companies: gCompanies });
} else {
// Only show companies that have data
const gCompanies = g.companies.filter(c => companiesInData.has(c)).sort();
if (gCompanies.length > 0) {
companyList.push({ group: g.name, companies: gCompanies.map(c => ({ name: c, hasData: true })) });
}
}
}
// Un-grouped companies (not in any list)
const groupedCompanies = new Set();
COMPANY_GROUPS.forEach(g => g.companies.forEach(c => groupedCompanies.add(c)));
const otherCompanies = [...companiesInData].filter(c => !groupedCompanies.has(c)).sort();
if (otherCompanies.length > 0) {
companyList.push({ group: '其他', companies: otherCompanies.map(c => ({ name: c, hasData: true })) });
}
// Build HTML
let html = '<div class="matrix-wrapper"><table class="matrix-table">';
// Column headers (same as target view)
const colGroups = [];
for (const dc of DISEASE_COLUMNS) {
if (colGroups.length === 0 || colGroups[colGroups.length-1].name !== dc.group) {
colGroups.push({ name: dc.group, cols: [dc] });
} else {
colGroups[colGroups.length-1].cols.push(dc);
}
}
html += '<thead>';
html += '<tr><th class="row-group-header" style="width:120px;">企业</th>';
for (const cg of colGroups) {
html += `<th class="col-group-header" colspan="${cg.cols.length}">${cg.name}</th>`;
}
html += '<th class="col-group-header" colspan="1" style="background:#4a4a6e;">罕见病</th>';
html += '</tr>';
html += '<tr><th class="row-group-header" style="background:#2a2a4e;"></th>';
for (const dc of DISEASE_COLUMNS) {
const lines = dc.display.split('\n');
html += `<th class="col-disease-header">${lines[0]}<br>${lines.slice(1).join('<br>')}</th>`;
}
html += '<th class="col-disease-header" style="background:#4a4a6e;">罕见病<br>Others</th>';
html += '</tr>';
html += '</thead><tbody>';
// Data rows
for (const cg of companyList) {
html += `<tr><td class="row-group-header" colspan="${DISEASE_COLUMNS.length + 2}">${cg.group}</td></tr>`;
for (const company of cg.companies) {
html += '<tr>';
if (company.hasData) {
// Count total projects for this company across all diseases (12 predefined)
let totalProjects = 0;
for (const dc of DISEASE_COLUMNS) {
const k = `${company.name}||${dc.key}`;
if (cellMap[k]) totalProjects += cellMap[k].totalCount;
}
const badgeColor = totalProjects >= 20 ? '#E53935' : totalProjects >= 10 ? '#F9A825' : totalProjects >= 5 ? '#42A5F5' : '#888';
html += `<td class="row-label">${company.name} <span style="font-size:10px;color:${badgeColor};font-weight:700;">[${totalProjects}]</span></td>`;
} else {
html += `<td class="row-label" style="color:#ccc;">${company.name}</td>`;
}
for (const dc of DISEASE_COLUMNS) {
const key = `${company.name}||${dc.key}`;
const cell = cellMap[key];
if (!cell || !company.hasData) {
html += `<td class="matrix-cell cell-no-data"><span style="color:#ddd;">-</span></td>`;
} else {
const colorClass = getCellColorClass(cell.cellStatus);
const display = `${cell.activeCount}/${cell.totalCount}`;
// Build target names for display (deduplicated)
const targetSet = [...new Set(cell.activePipelines.map(p => p.target))];
const targetDisplay = targetSet.slice(0, 4).join(', ');
const more = targetSet.length > 4 ? ` +${targetSet.length - 4}` : '';
html += `<td class="matrix-cell ${colorClass}" onclick="openModalCompany(encodeURIComponent('${company.name}'),'${dc.key}')">`;
html += `<div class="cell-count">${display}</div>`;
html += `<div class="cell-sub">${targetDisplay}${more}</div>`;
html += '</td>';
}
}
// === 罕见病列：汇总15主适应症之外的管线 ===
const rarePipes = rows.filter(r => r.company === company.name && !PREDEFINED_DISEASE_KEYS.has(r.disease));
if (rarePipes.length > 0) {
const activeRare = rarePipes.filter(p => p.status !== 'Inactive');
const rareStatus = activeRare.length > 0
? getCellStatus(getPhaseMaxPhase(activeRare.map(p => p.phaseGlobal)), getPhaseMaxPhase(activeRare.map(p => p.phaseChina)), false)
: 'negative';
const rareColorClass = getCellColorClass(rareStatus);
const rareTargets = [...new Set(activeRare.map(p => p.target))];
// Show top diseases instead of targets so user can see what is in the column
const diseaseNames = [...new Set(activeRare.map(p => p.disease))];
const rareDiseaseDisplay = diseaseNames.slice(0, 2).join(', ');
const rareMore = diseaseNames.length > 2 ? ` +${diseaseNames.length - 2}` : '';
html += `<td class="matrix-cell ${rareColorClass}" onclick="openModalCompanyRare(encodeURIComponent('${company.name}'))">`;
html += `<div class="cell-count">${activeRare.length}/${rarePipes.length}</div>`;
html += `<div class="cell-sub">${rareTargetDisplay}${rareMore}</div>`;
html += '</td>';
} else {
html += '<td class="matrix-cell cell-no-data"><span style="color:#ddd;">-</span></td>';
}
html += '</tr>';
}
}
// Add target pathway competition summary at bottom
html += '<tr><td class="row-group-header" colspan="' + (DISEASE_COLUMNS.length + 2) + '" style="background:#1a1a2e;color:#ffd54f;font-size:13px;">🔍 靶点通路·竞争热力</td></tr>';
for (const tg of TARGET_GROUPS) {
const pathwayRows = filtered.filter(r => getTargetGroup(r.target) === tg.name);
if (pathwayRows.length === 0) continue;
const targetCountPerDisease = {};
for (const dc of DISEASE_COLUMNS) {
const diseaseRows = pathwayRows.filter(r => r.disease === dc.key);
const uniqueTargets = new Set(diseaseRows.map(r => r.target));
targetCountPerDisease[dc.key] = uniqueTargets.size;
}
html += '<tr>';
html += `<td class="row-label" style="font-size:11px;color:#555;padding:4px 12px;">${tg.name}</td>`;
for (const dc of DISEASE_COLUMNS) {
const cnt = targetCountPerDisease[dc.key] || 0;
let color = '#f5f5f5';
let textColor = '#bbb';
if (cnt >= 10) { color = '#E53935'; textColor = '#fff'; }
else if (cnt >= 5) { color = '#F9A825'; textColor = '#1a1a2e'; }
else if (cnt >= 1) { color = '#81C784'; textColor = '#1a1a2e'; }
html += `<td style="background:${color};color:${textColor};text-align:center;font-size:12px;font-weight:600;padding:6px 4px;border:1px solid #e0e0e0;">${cnt > 0 ? cnt : '-'}</td>`;
}
// 罕见病列：统计该通路在表外适应症中的靶点数
const rareTargetsForPathway = new Set(pathwayRows.filter(r => !PREDEFINED_DISEASE_KEYS.has(r.disease)).map(r => r.target));
const rareCnt = rareTargetsForPathway.size;
let rareColor = '#f5f5f5';
let rareTextColor = '#bbb';
if (rareCnt >= 10) { rareColor = '#E53935'; rareTextColor = '#fff'; }
else if (rareCnt >= 5) { rareColor = '#F9A825'; rareTextColor = '#1a1a2e'; }
else if (rareCnt >= 1) { rareColor = '#81C784'; rareTextColor = '#1a1a2e'; }
html += `<td style="background:${rareColor};color:${rareTextColor};text-align:center;font-size:12px;font-weight:600;padding:6px 4px;border:1px solid #e0e0e0;">${rareCnt > 0 ? rareCnt : '-'}</td>`;
html += '</tr>';
}
html += '</tbody></table></div>';
container.innerHTML = html;
}
// ========== MODAL ==========
// Shared: group pipelines by target, then by active/terminated
function buildModalByTarget(pipelines) {
const active = pipelines.filter(p => p.status !== 'Inactive');
const terminated = pipelines.filter(p => p.status === 'Inactive');
// Status line
let statusText = '';
if (active.length > 0) {
const gPhase = getPhaseMaxPhase(active.map(p => p.phaseGlobal));
const cPhase = getPhaseMaxPhase(active.map(p => p.phaseChina));
statusText = `全球：${gPhase || '无数据'} | 中国：${cPhase || '无数据'}`;
} else {
statusText = '已终止/暂停/失败';
}
// Group by target
function groupByTarget(items) {
const map = {};
for (const p of items) {
const t = p.target || '(无靶点)';
if (!map[t]) map[t] = [];
map[t].push(p);
}
// For each target, find highest phase and count drugs
const result = [];
for (const [target, entries] of Object.entries(map)) {
const globalPhases = entries.map(e => e.phaseGlobal);
const bestPhase = getPhaseMaxPhase(globalPhases);
result.push({ target, count: entries.length, bestPhase, chinaPhase: entries[0].phaseChina, entries });
}
// Sort: approved first, then by phase rank
result.sort((a, b) => {
const ra = PHASE_RANK[a.bestPhase] !== undefined ? PHASE_RANK[a.bestPhase] : 999;
const rb = PHASE_RANK[b.bestPhase] !== undefined ? PHASE_RANK[b.bestPhase] : 999;
return ra - rb;
});
return result;
}
const activeGroups = groupByTarget(active);
const terminatedGroups = groupByTarget(terminated);
const targetCount = new Set(active.concat(terminated).map(p => p.target)).size;
let bodyHtml = '';
// Title
if (activeGroups.length > 0) {
bodyHtml += '<div class="pipeline-section">';
bodyHtml += `<h3 class="active-title">—Active（${active.length}条，${activeGroups.length}靶点）—</h3>`;
for (const g of activeGroups) {
const fmt = formatPhaseTag(g.bestPhase);
const chinaBadge = g.chinaPhase === '批准上市'
? '<span class="status-badge status-global-china">中国已批</span>'
: (g.chinaPhase ? `<span class="status-badge" style="background:#F9A825;color:#1a1a2e;">中国${g.chinaPhase}</span>` : '');
bodyHtml += `<div class="pipeline-item">
<span class="drug-name">${g.target}</span>
<span><span class="phase-tag ${fmt.cls}">${fmt.label}</span>${chinaBadge}</span>
</div>`;
}
bodyHtml += '</div>';
}
if (terminatedGroups.length > 0) {
bodyHtml += '<div class="pipeline-section">';
bodyHtml += `<h3 class="terminated-title">—Terminated（${terminated.length}条，${terminatedGroups.length}靶点）—</h3>`;
for (const g of terminatedGroups) {
bodyHtml += `<div class="pipeline-item">
<span class="drug-name">${g.target}</span>
<span><span class="phase-tag terminated">终止</span></span>
</div>`;
}
bodyHtml += '</div>';
}
return { statusText, bodyHtml, activeCount: active.length, targetCount };
}
function openModal(targetName, diseaseName) {
const filtered = getFilteredRows(allRows);
const relevant = filtered.filter(r => r.target === targetName && r.disease === diseaseName);
if (relevant.length === 0) {
modalTitle.textContent = `${targetName} → ${diseaseName}`;
modalSub.textContent = '无管线记录';
modalBody.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">该组合无管线数据</div>';
modalOverlay.classList.add('show');
return;
}
const result = buildModalByTarget(relevant);
modalTitle.textContent = `${targetName} → ${diseaseName}`;
modalSub.textContent = result.statusText;
modalBody.innerHTML = result.bodyHtml;
modalOverlay.classList.add('show');
}
function openModalCompany(companyName, diseaseName) {
companyName = decodeURIComponent(companyName);
const filtered = getFilteredRows(allRows);
const relevant = filtered.filter(r => (r.company) === companyName && r.disease === diseaseName);
if (relevant.length === 0) {
modalTitle.textContent = `${companyName} → ${diseaseName}`;
modalSub.textContent = '无管线记录';
modalBody.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">该企业在此适应症无管线数据</div>';
modalOverlay.classList.add('show');
return;
}
const result = buildModalByTarget(relevant);
modalTitle.textContent = `${companyName} → ${diseaseName}`;
modalSub.textContent = result.statusText;
modalBody.innerHTML = result.bodyHtml;
modalOverlay.classList.add('show');
}
function openModalCompanyRare(companyName) {
companyName = decodeURIComponent(companyName);
const filtered = getFilteredRows(allRows);
const rarePipes = filtered.filter(r => r.company === companyName && !PREDEFINED_DISEASE_KEYS.has(r.disease));
if (rarePipes.length === 0) {
modalTitle.textContent = `${companyName} → 罕见病`;
modalSub.textContent = '无管线记录';
modalBody.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">该企业无罕见病/其他适应症管线</div>';
modalOverlay.classList.add('show');
return;
}
// Group by disease
const byDisease = {};
for (const p of rarePipes) {
if (!byDisease[p.disease]) byDisease[p.disease] = [];
byDisease[p.disease].push(p);
}
const sortedDiseases = Object.entries(byDisease).sort((a, b) => b[1].length - a[1].length);
const activePipes = rarePipes.filter(p => p.status !== 'Inactive');
let statusText = '';
if (activePipes.length > 0) {
const gPhase = getPhaseMaxPhase(activePipes.map(p => p.phaseGlobal));
const cPhase = getPhaseMaxPhase(activePipes.map(p => p.phaseChina));
statusText = `共 ${rarePipes.length} 条罕见病/其他适应症管线 | 全球：${gPhase || '无数据'} | 中国：${cPhase || '无数据'}`;
} else {
statusText = `共 ${rarePipes.length} 条罕见病/其他适应症管线（已终止）`;
}
let bodyHtml = '<div class="pipeline-section">';
bodyHtml += `<h3 style="font-size:13px;font-weight:600;margin-bottom:8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:4px;">按适应症归类列表</h3>`;
for (const [disease, pipes] of sortedDiseases) {
const active = pipes.filter(p => p.status !== 'Inactive').length;
const terminated = pipes.filter(p => p.status === 'Inactive').length;
const targets = [...new Set(pipes.map(p => p.target))].join(', ');
const globalPhases = pipes.map(p => p.phaseGlobal).filter(p => p);
const bestPhase = getPhaseMaxPhase(globalPhases);
const fmt = formatPhaseTag(bestPhase || '');
bodyHtml += `<div class="pipeline-item">
<span><strong>${disease}</strong> (${pipes.length}条) <span style="font-size:11px;color:#888;">靶点: ${targets}</span></span>
<span>${fmt.label ? `<span class="phase-tag ${fmt.cls}">${fmt.label}</span>` : ''}</span>
</div>`;
if (terminated > 0) {
bodyHtml += `<div class="pipeline-subitem" style="color:#E53935;">${terminated}条终止</div>`;
}
}
bodyHtml += '</div>';
modalTitle.textContent = `${companyName} → 罕见病/其他适应症`;
modalSub.textContent = statusText;
modalBody.innerHTML = bodyHtml;
modalOverlay.classList.add('show');
}
// ========== EVENT HANDLERS ==========
// Filter buttons
filterBtns.forEach(btn => {
btn.addEventListener('click', () => {
filterBtns.forEach(b => b.classList.remove('active'));
btn.classList.add('active');
currentFilter = btn.dataset.filter;
render(currentView);
});
});
// Tab buttons
tabBtns.forEach(btn => {
btn.addEventListener('click', () => {
tabBtns.forEach(b => b.classList.remove('active'));
btn.classList.add('active');
currentView = btn.dataset.view;
render(currentView);
});
});
// Show all companies toggle
showAllCb.addEventListener('change', () => {
showAllCompanies = showAllCb.checked;
if (currentView === 'company') render('company');
});
// Modal close
document.getElementById('modalClose').addEventListener('click', () => {
modalOverlay.classList.remove('show');
});
modalOverlay.addEventListener('click', (e) => {
if (e.target === modalOverlay) modalOverlay.classList.remove('show');
});
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') modalOverlay.classList.remove('show');
});
// ========== INIT ==========
loadData();
